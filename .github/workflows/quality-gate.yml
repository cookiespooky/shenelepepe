name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compat_mode: [auto, modern, legacy]
        notes_mode: [present, absent]
        source_mode: [local, s3]
    env:
      NOTEPUB_VERSION: v0.1.7
      NOTEPUB_BIN: ./.np/bin/notepub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download notepub binary
        run: |
          mkdir -p ./.np/bin
          curl -fL -o ./.np/bin/notepub "https://github.com/cookiespooky/notepub/releases/download/${NOTEPUB_VERSION}/notepub_linux_amd64"
          chmod +x ./.np/bin/notepub
          ./.np/bin/notepub version

      - name: Apply compat mode
        env:
          COMPAT_MODE: ${{ matrix.compat_mode }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(".np/config.yaml")
          text = path.read_text(encoding="utf-8")
          mode = os.environ["COMPAT_MODE"]
          line = f'compat_mode: "{mode}"'
          if re.search(r'(?m)^compat_mode:\s*.*$', text):
              text = re.sub(r'(?m)^compat_mode:\s*.*$', line, text)
          else:
              text = line + "\n\n" + text
          path.write_text(text, encoding="utf-8")
          PY

      - name: Apply notes mode
        if: matrix.notes_mode == 'absent'
        run: |
          rm -f ./Site.md ./Interface.md

      - name: Run local source gate
        if: matrix.source_mode == 'local'
        run: |
          ./.np/scripts/build.sh

      - name: Build S3 effective config
        if: matrix.source_mode == 's3'
        env:
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_REGION: us-east-1
          S3_BUCKET: ci-bucket
          S3_PREFIX: content
          S3_USE_PATH_STYLE: true
          S3_ACCESS_KEY: ci-access
          S3_SECRET_KEY: ci-secret
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          src = Path("./.np/config.yaml")
          dst = Path("./.np/config.effective.yaml")
          lines = src.read_text(encoding="utf-8").splitlines()

          out = []
          i = 0
          saw_content = False
          while i < len(lines):
              line = lines[i]
              if re.match(r"^s3:\s*$", line):
                  i += 1
                  while i < len(lines) and (lines[i].startswith(" ") or lines[i].strip() == ""):
                      i += 1
                  continue

              if re.match(r"^content:\s*$", line):
                  saw_content = True
                  out.append(line)
                  i += 1
                  saw_source = False
                  while i < len(lines):
                      nested = lines[i]
                      if re.match(r"^[A-Za-z_][A-Za-z0-9_]*:\s*$", nested):
                          break
                      if re.match(r"^\s{2}source:\s*", nested):
                          out.append('  source: "s3"')
                          saw_source = True
                      else:
                          out.append(nested)
                      i += 1
                  if not saw_source:
                      out.append('  source: "s3"')
                  continue

              out.append(line)
              i += 1

          if not saw_content:
              out.extend(["content:", '  source: "s3"'])

          out.extend(
              [
                  "",
                  "s3:",
                  f'  endpoint: "{os.environ["S3_ENDPOINT"]}"',
                  f'  region: "{os.environ["S3_REGION"]}"',
                  f'  force_path_style: {os.environ.get("S3_USE_PATH_STYLE", "true")}',
                  f'  bucket: "{os.environ["S3_BUCKET"]}"',
                  f'  prefix: "{os.environ.get("S3_PREFIX", "content")}"',
                  f'  access_key: "{os.environ["S3_ACCESS_KEY"]}"',
                  f'  secret_key: "{os.environ["S3_SECRET_KEY"]}"',
              ]
          )

          dst.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Validate S3 effective config
        if: matrix.source_mode == 's3'
        run: |
          "$NOTEPUB_BIN" validate --config ./.np/config.effective.yaml --rules ./.np/rules.yaml
