<article class="content">
  {{ .Body }}
</article>

{{- $hubs := .Collections.nav_hubs.Items -}}
{{- if $hubs }}
<section class="section">
  <h2 class="section-title">{{ index .Settings "ui_home_hubs_title" }}</h2>
  <div class="grid grid-3">
    {{- range $hubs }}
    <a class="card card-link" href="{{ printf "%s%s" $.BaseURL .Path }}">
      <h3>{{ .Title }}</h3>
      {{- if .Description }}
      <p>{{ .Description }}</p>
      {{- end }}
    </a>
    {{- end }}
  </div>
</section>
{{- end }}
