{{- $hubItems := .Collections.hub_items.Items -}}
<article class="content">
  {{ .Body }}
</article>

{{- if $hubItems }}
<section class="section">
  <h2 class="section-title">{{ index .Settings "ui_hub_materials_title" }}</h2>
  <div class="grid grid-3">
    {{- range $hubItems }}
    <a class="card card-link" href="{{ printf "%s%s" $.BaseURL .Path }}">
      <h3>{{ .Title }}</h3>
      {{- if .Description }}
      <p>{{ .Description }}</p>
      {{- end }}
    </a>
    {{- end }}
  </div>
</section>
{{- end }}
