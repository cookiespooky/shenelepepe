site:
  id: np-template-docs
  base_url: "http://127.0.0.1:8080/" # local fallback; CI injects the GitHub Pages URL automatically
  media_base_url: "http://127.0.0.1:8080/media/" # local fallback; CI injects the GitHub Pages media URL automatically
  title: "Notepub Docs Template"
  description: "Template repository for documentation websites powered by Notepub."
  default_og_image: "/media/notepub.jpg"
  analytics:
    enabled: false
    provider: "yandex_metrika"
    yandex_counter_id: ""

runtime:
  # auto keeps local builds on 127.0.0.1 and lets CI inject production URLs.
  mode: "auto"
settings:
  site_language: "en"
  site_icon: "/media/notepub.png"
  brand_name: "Notepub"
  brand_logo: "/media/notepub.svg"
  theme_accent: "#0a0a0a"
  theme_link: "#0a0a0a"
  theme_font: "system"
  theme_heading_font: "system"
  theme_font_stack: ""
  theme_heading_font_stack: ""
  theme_font_url: ""
  theme_radius: "14"
  ui_home: "Home"
  ui_documentation_navigation: "Documentation navigation"
  ui_breadcrumb: "Breadcrumb"
  ui_open_navigation: "Open navigation"
  ui_close_navigation: "Close navigation"
  ui_search: "Search"
  ui_close: "Close"
  ui_search_placeholder: "Search documentation"
  ui_all_results: "All results"
  ui_search_query: "Query"
  ui_search_no_results: "No results"
  ui_search_no_results_found: "No results found."
  ui_search_loading: "Loading..."
  ui_search_error: "Error loading results"
  ui_next_page: "Next page"
  ui_home_hubs_title: "Documentation Hubs"
  ui_hub_materials_title: "Section Materials"
  ui_related_materials_title: "Related Materials"
  ui_not_found_title: "Page not found"
  ui_not_found_lead: "The page no longer exists or was never created."
  ui_not_found_back: "Back to Home"
  ui_error_title: "Error"
  ui_error_lead: "The template could not render this page. Reason is below."
overrides:
  site_note: "../Site.md"
  interface_note: "../Interface.md"
content:
  source: "local"
  local_dir: "../content"
paths:
  file_root: ./.notepub
  artifacts_dir: ./.notepub/artifacts
  snapshot_file: ./.notepub/snapshot/objects.json
  cache_root: ./.notepub/cache
theme:
  dir: "./.np"
  name: "theme"
  templates_subdir: "templates"
  assets_subdir: "assets"
rules_path: "./.np/rules.yaml"
server:
  listen: "127.0.0.1:8080"
cache:
  html_ttl_seconds: 600
  stale_if_error_seconds: 604800
